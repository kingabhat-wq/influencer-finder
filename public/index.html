<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Influencer Finder — AI Growth Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --surface2: #1a1a1d;
    --border: #2a2a2e;
    --border2: #3a3a3f;
    --text: #f0f0f2;
    --muted: #888890;
    --accent: #4f8ef7;
    --accent2: #2563eb;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --purple: #a78bfa;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .logo-text { font-family: var(--mono); font-size: 14px; color: var(--text); letter-spacing: 0.05em; }
  .badge { font-size: 11px; background: #1e3a5f; color: var(--accent); padding: 3px 10px; border-radius: 999px; font-family: var(--mono); }

  main { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

  h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 15px; margin-bottom: 36px; }

  .config-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 12px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; }
  select, input[type="number"], input[type="password"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
    font-family: var(--sans);
    outline: none;
    transition: border-color 0.15s;
  }
  select:focus, input:focus { border-color: var(--accent); }

  .keys-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }

  .run-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--sans);
    transition: background 0.15s, transform 0.1s;
    margin-bottom: 28px;
  }
  .run-btn:hover { background: var(--accent2); }
  .run-btn:active { transform: scale(0.99); }
  .run-btn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }

  .pipeline { display: none; margin-bottom: 28px; }
  .pipeline.show { display: block; }

  .progress-track { background: var(--surface2); border-radius: 999px; height: 4px; margin-bottom: 16px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width 0.4s ease; width: 0%; }

  .log-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-family: var(--mono);
    font-size: 12px;
    max-height: 200px;
    overflow-y: auto;
    line-height: 2;
  }
  .log-ok { color: var(--green); }
  .log-info { color: var(--accent); }
  .log-warn { color: var(--amber); }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; display: none; }
  .stats.show { display: grid; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
  .stat-val { font-size: 26px; font-weight: 600; font-family: var(--mono); }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }

  .results { display: none; }
  .results.show { display: block; }

  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .results-header h2 { font-size: 16px; font-weight: 500; }
  .export-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-family: var(--sans);
    transition: border-color 0.15s;
  }
  .export-btn:hover { border-color: var(--accent); color: var(--accent); }

  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-chip {
    padding: 5px 14px;
    border-radius: 999px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: var(--mono);
    transition: all 0.15s;
  }
  .filter-chip.on { background: #1e3a5f; color: var(--accent); border-color: var(--accent); }

  .contact-list { display: flex; flex-direction: column; gap: 8px; }
  .contact-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.15s;
    animation: fadeIn 0.3s ease;
  }
  .contact-card:hover { border-color: var(--border2); }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:none;} }

  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 13px; flex-shrink: 0;
    font-family: var(--mono);
  }
  .contact-info { flex: 1; min-width: 0; }
  .contact-name { font-size: 14px; font-weight: 500; }
  .contact-handle { font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .contact-bio { font-size: 12px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 380px; }
  .contact-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; flex-wrap: wrap; }

  .pill { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-family: var(--mono); }
  .pill-score-high { background: #14321c; color: var(--green); }
  .pill-score-mid { background: #2d1f00; color: var(--amber); }
  .pill-niche { background: var(--surface2); color: var(--muted); }
  .pill-email { background: #1e2a3f; color: var(--accent); }
  .pill-followers { background: var(--surface2); color: var(--muted); }

  .score-bar { text-align: right; flex-shrink: 0; }
  .score-num { font-family: var(--mono); font-size: 18px; font-weight: 500; }
  .score-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 999px; }

  @media (max-width: 640px) {
    .config-grid { grid-template-columns: 1fr; }
    .keys-row { grid-template-columns: 1fr; }
    .stats { grid-template-columns: 1fr 1fr; }
    .contact-bio { max-width: 200px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div class="logo-text">influencer-finder</div>
  </div>
  <div class="badge">AI Growth Pipeline</div>
</header>

<main>
  <h1>Find 50+ Influencer Contacts</h1>
  <p class="subtitle">ScrapeGraph scrapes → Gemini AI scores → CSV export. Built for growth teams.</p>

  <div class="keys-row">
    <div class="field">
      <label>ScrapeGraph API Key</label>
      <input type="password" id="sgKey" placeholder="sgai_xxxxxxxxxxxxxxxx" />
    </div>
    <div class="field">
      <label>Gemini API Key</label>
      <input type="password" id="geminiKey" placeholder="AIzaSy..." />
    </div>
  </div>

  <div class="config-grid">
    <div class="field">
      <label>Niche</label>
      <select id="niche">
        <option>AI + Hardware</option>
        <option>Consumer Tech</option>
        <option>Startup & Founder</option>
        <option>Developer Tools</option>
        <option>B2B SaaS</option>
        <option>EdTech</option>
      </select>
    </div>
    <div class="field">
      <label>Target contacts</label>
      <input type="number" id="target" value="50" min="10" max="200" />
    </div>
    <div class="field">
      <label>Min relevance score</label>
      <select id="minScore">
        <option value="5">5+ (wider net)</option>
        <option value="6" selected>6+ (balanced)</option>
        <option value="7">7+ (strict)</option>
        <option value="8">8+ (best only)</option>
      </select>
    </div>
  </div>

  <button class="run-btn" id="runBtn" onclick="runPipeline()">
    ▶ Run Pipeline
  </button>

  <div class="pipeline" id="pipeline">
    <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
    <div class="log-box" id="logBox"></div>
  </div>

  <div class="stats" id="stats">
    <div class="stat"><div class="stat-val" id="sTotal">0</div><div class="stat-lbl">Scraped</div></div>
    <div class="stat"><div class="stat-val" id="sQual" style="color:var(--green)">0</div><div class="stat-lbl">Qualified</div></div>
    <div class="stat"><div class="stat-val" id="sEmail" style="color:var(--accent)">0</div><div class="stat-lbl">Emails found</div></div>
    <div class="stat"><div class="stat-val" id="sAvg" style="color:var(--purple)">0</div><div class="stat-lbl">Avg score</div></div>
  </div>

  <div class="results" id="results">
    <div class="results-header">
      <h2 id="resultsTitle">Contacts</h2>
      <button class="export-btn" onclick="exportCSV()">↓ Export CSV</button>
    </div>
    <div class="filter-row" id="filterRow"></div>
    <div class="contact-list" id="contactList"></div>
  </div>
</main>

<script>
let allContacts = [];
let activeFilter = 'all';

const avatarColors = [
  ['#1e3a5f','#4f8ef7'],['#14321c','#22c55e'],
  ['#2d1f00','#f59e0b'],['#2d1228','#a78bfa'],
  ['#2d1515','#ef4444'],
];

function initials(name) {
  return (name || '??').split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase();
}

function scoreColor(s) {
  if (s >= 8) return 'var(--green)';
  if (s >= 6) return 'var(--amber)';
  return 'var(--muted)';
}

function log(msg, level = 'info') {
  const box = document.getElementById('logBox');
  const div = document.createElement('div');
  div.className = `log-${level}`;
  div.textContent = msg;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function setProgress(v) {
  document.getElementById('progFill').style.width = v + '%';
}

async function runPipeline() {
  const sgKey = document.getElementById('sgKey').value.trim();
  const geminiKey = document.getElementById('geminiKey').value.trim();
  if (!sgKey || !geminiKey) { alert('Please enter both API keys'); return; }

  const niche = document.getElementById('niche').value;
  const target = parseInt(document.getElementById('target').value);
  const minScore = parseInt(document.getElementById('minScore').value);

  document.getElementById('runBtn').disabled = true;
  document.getElementById('runBtn').textContent = '⏳ Running...';
  document.getElementById('pipeline').classList.add('show');
  document.getElementById('logBox').innerHTML = '';
  document.getElementById('stats').classList.remove('show');
  document.getElementById('results').classList.remove('show');
  allContacts = [];

  try {
    const res = await fetch('/api/find', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ niche, target, minScore, sgKey, geminiKey }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        try {
          const evt = JSON.parse(line.slice(5).trim());
          if (evt.type === 'log') log(evt.msg, evt.level);
          if (evt.type === 'progress') setProgress(evt.value);
          if (evt.type === 'done') {
            allContacts = evt.contacts;
            showResults(evt.contacts, evt.total);
          }
        } catch {}
      }
    }
  } catch (e) {
    log('✗ Error: ' + e.message, 'warn');
  }

  document.getElementById('runBtn').disabled = false;
  document.getElementById('runBtn').textContent = '▶ Run Again';
}

function showResults(contacts, total) {
  const emails = contacts.filter(c => c.email && c.email.includes('@')).length;
  const avg = contacts.length ? (contacts.reduce((s,c)=>s+c.score,0)/contacts.length).toFixed(1) : 0;

  document.getElementById('sTotal').textContent = total;
  document.getElementById('sQual').textContent = contacts.length;
  document.getElementById('sEmail').textContent = emails;
  document.getElementById('sAvg').textContent = avg;
  document.getElementById('stats').classList.add('show');

  const niches = [...new Set(contacts.map(c => c.niche).filter(Boolean))];
  const filterRow = document.getElementById('filterRow');
  filterRow.innerHTML = `<div class="filter-chip on" onclick="filterBy('all',this)">All (${contacts.length})</div>` +
    niches.map(n => `<div class="filter-chip" onclick="filterBy('${n}',this)">${n} (${contacts.filter(c=>c.niche===n).length})</div>`).join('');

  renderCards(contacts);
  document.getElementById('resultsTitle').textContent = `${contacts.length} Contacts`;
  document.getElementById('results').classList.add('show');
}

function filterBy(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  const filtered = f === 'all' ? allContacts : allContacts.filter(c => c.niche === f);
  renderCards(filtered);
}

function renderCards(contacts) {
  const list = document.getElementById('contactList');
  if (!contacts.length) { list.innerHTML = '<div class="empty">No contacts found. Try lowering the min score.</div>'; return; }

  list.innerHTML = contacts.map((c, i) => {
    const [bg, fg] = avatarColors[i % avatarColors.length];
    const scoreCls = c.score >= 8 ? 'pill-score-high' : 'pill-score-mid';
    return `<div class="contact-card">
      <div class="avatar" style="background:${bg};color:${fg};">${initials(c.name)}</div>
      <div class="contact-info">
        <div class="contact-name">${c.name || 'Unknown'}</div>
        <div class="contact-handle">${c.handle || ''}</div>
        <div class="contact-bio">${c.bio || c.reason || ''}</div>
        <div class="contact-meta">
          ${c.followers ? `<span class="pill pill-followers">${c.followers}</span>` : ''}
          ${c.niche ? `<span class="pill pill-niche">${c.niche}</span>` : ''}
          ${c.email ? `<span class="pill pill-email">✉ ${c.email}</span>` : ''}
        </div>
      </div>
      <div class="score-bar">
        <div class="score-num" style="color:${scoreColor(c.score)}">${c.score}</div>
        <div class="score-label">/ 10</div>
      </div>
    </div>`;
  }).join('');
}

function exportCSV() {
  if (!allContacts.length) return;
  fetch('/api/export', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contacts: allContacts }),
  }).then(r => r.blob()).then(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'influencers.csv';
    a.click();
  });
}
</script>
</body>
</html>
